version: "3.9"

# Production stack. Deploy with:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Nginx terminates SSL on the host and forwards to these services.

services:
  postgres:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 21600 1
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    expose: ["8000"]
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  gateway:
    build: ./backend
    restart: unless-stopped
    command: python -m gateway.server
    expose: ["9000"]
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  feature_worker:
    build: ./backend
    restart: unless-stopped
    command: python -m workers.feature_worker
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }

  inference_worker:
    build: ./backend
    restart: unless-stopped
    command: python -m workers.inference_worker
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    volumes:
      - modelstore:/app/ml/model_store

  alert_worker:
    build: ./backend
    restart: unless-stopped
    command: python -m workers.alert_worker
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }

  health_score_worker:
    build: ./backend
    restart: unless-stopped
    command: python -m workers.health_score_worker
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose: ["80"]

  landing:
    image: nginx:1.27-alpine
    restart: unless-stopped
    expose: ["80"]
    volumes:
      - ./landing:/usr/share/nginx/html:ro

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on: [backend, gateway, frontend, landing]

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/backup_db.sh"]
    env_file: .env.prod
    volumes:
      - ./scripts/backup_db.sh:/scripts/backup_db.sh:ro
      - backups:/backups
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
  modelstore:
  backups:
