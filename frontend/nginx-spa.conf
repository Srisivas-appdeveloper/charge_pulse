server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + WebSocket: the outer nginx routes /api/* directly to backend,
    # but if this container is hit standalone, proxy it.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
