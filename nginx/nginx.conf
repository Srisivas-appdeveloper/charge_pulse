user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Real client IP behind nginx for app logs.
    log_format combined_realip '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log combined_realip;

    upstream backend  { server backend:8000;  }
    upstream gateway  { server gateway:9000;  }
    upstream frontend { server frontend:80;   }
    upstream landing  { server landing:80;    }

    # --- Marketing landing: chargepulse.in ---
    server {
        listen 80;
        server_name chargepulse.in www.chargepulse.in;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }
    server {
        listen 443 ssl http2;
        server_name chargepulse.in www.chargepulse.in;
        ssl_certificate     /etc/letsencrypt/live/chargepulse.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chargepulse.in/privkey.pem;
        location / { proxy_pass http://landing; proxy_set_header Host $host; }
    }

    # --- Dashboard SPA: app.chargepulse.in ---
    server {
        listen 80;
        server_name app.chargepulse.in;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }
    server {
        listen 443 ssl http2;
        server_name app.chargepulse.in;
        ssl_certificate     /etc/letsencrypt/live/app.chargepulse.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.chargepulse.in/privkey.pem;
        location / { proxy_pass http://frontend; proxy_set_header Host $host; }
    }

    # --- REST + WebSocket: api.chargepulse.in ---
    server {
        listen 80;
        server_name api.chargepulse.in;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }
    server {
        listen 443 ssl http2;
        server_name api.chargepulse.in;
        ssl_certificate     /etc/letsencrypt/live/api.chargepulse.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chargepulse.in/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10m;
        }
    }

    # --- OCPP CSMS WebSocket: csms.chargepulse.in ---
    # Must hold connections open for hours. Bump read/send timeouts.
    server {
        listen 80;
        server_name csms.chargepulse.in;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }
    server {
        listen 443 ssl http2;
        server_name csms.chargepulse.in;
        ssl_certificate     /etc/letsencrypt/live/csms.chargepulse.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/csms.chargepulse.in/privkey.pem;

        location /ocpp/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout  86400s;  # 24h — chargers stay connected for days
            proxy_send_timeout  86400s;
        }
    }
}
